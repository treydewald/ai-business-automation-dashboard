apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "automation-dashboard.fullname" . }}-backend
  labels:
    {{- include "automation-dashboard.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      {{- include "automation-dashboard.selectorLabels" . | nindent 6 }}
      component: backend
  template:
    metadata:
      labels:
        {{- include "automation-dashboard.selectorLabels" . | nindent 8 }}
        component: backend
    spec:
      initContainers:
      - name: migrate
        image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
        imagePullPolicy: {{ .Values.backend.pullPolicy }}
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.postgresPassword }}@{{ include \"automation-dashboard.fullname\" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
      containers:
      - name: backend
        image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
        imagePullPolicy: {{ .Values.backend.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.backend.port }}
          protocol: TCP
        env:
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.postgresPassword }}@{{ include \"automation-dashboard.fullname\" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "automation-dashboard.fullname" . }}-secrets
              key: jwt-secret
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "automation-dashboard.fullname" . }}-secrets
              key: encryption-key
        - name: LOG_LEVEL
          value: "{{ .Values.backend.logLevel }}"
        - name: ENVIRONMENT
          value: "production"
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          {{- toYaml .Values.backend.resources | nindent 12 }}
