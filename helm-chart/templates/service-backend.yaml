apiVersion: v1
kind: Service
metadata:
  name: {{ include "automation-dashboard.fullname" . }}-backend
  labels:
    {{- include "automation-dashboard.labels" . | nindent 4 }}
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "automation-dashboard.selectorLabels" . | nindent 4 }}
    component: backend
