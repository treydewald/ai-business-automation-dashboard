apiVersion: v1
kind: Secret
metadata:
  name: {{ include "automation-dashboard.fullname" . }}-secrets
  labels:
    {{- include "automation-dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc }}
  encryption-key: {{ .Values.secrets.encryptionKey | b64enc }}
